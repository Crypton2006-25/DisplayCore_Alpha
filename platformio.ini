[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI
  paulstoffregen/XPT2046_Touchscreen

build_flags =
  -D USER_SETUP_LOADED
  -D ST7796_DRIVER
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=480
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=20000000
  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
